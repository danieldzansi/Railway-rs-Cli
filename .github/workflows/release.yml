name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        run: cargo build --release --bin railway-rs --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: railway-rs-linux
          path: target/x86_64-unknown-linux-gnu/release/railway-rs

  build-macos-x86:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build
        run: cargo build --release --bin railway-rs --target x86_64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: railway-rs-macos-x86
          path: target/x86_64-apple-darwin/release/railway-rs

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --bin railway-rs --target aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: railway-rs-macos-arm
          path: target/aarch64-apple-darwin/release/railway-rs

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --bin railway-rs --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: railway-rs-windows
          path: target/x86_64-pc-windows-msvc/release/railway-rs.exe

  release:
    needs: [build-linux, build-macos-x86, build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Rename binaries
        run: |
          mv railway-rs-linux/railway-rs railway-rs-x86_64-linux
          mv railway-rs-macos-x86/railway-rs railway-rs-x86_64-macos
          mv railway-rs-macos-arm/railway-rs railway-rs-aarch64-macos
          mv railway-rs-windows/railway-rs.exe railway-rs-x86_64-windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            railway-rs-x86_64-linux
            railway-rs-x86_64-macos
            railway-rs-aarch64-macos
            railway-rs-x86_64-windows.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
